api-version: 2024-02-02-preview
location: {{ .Env.AZURE_LOCATION }}
identity:
  type: UserAssigned
  userAssignedIdentities:
    ? "{{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}"
    : {}
properties:
  environmentId: {{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_ID }}
  configuration:
    activeRevisionsMode: single
    runtime:
      dotnet:
        autoConfigureDataProtection: true
    ingress:
      external: true
      targetPort: {{ targetPortOrDefault 8080 }}
      transport: http
      allowInsecure: false
      customDomains:
        - name: www.mentoory.com
          bindingType: SniEnabled
          certificateId: "/subscriptions/721927fe-7a42-45e2-bb6a-784c35c4cc69/resourceGroups/rg-LinaSys-P/providers/Microsoft.App/managedEnvironments/cae-htejpd7l3itk6/managedCertificates/www.mentoory.com-cae-htej-250824063201"
    registries:
      - server: {{ .Env.AZURE_CONTAINER_REGISTRY_ENDPOINT }}
        identity: {{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}
    secrets:
      - name: connectionstrings--defaultconnection
        value: Server=tcp:{{ .Env.LINA_DBSERVER_SQLSERVERFQDN }},1433;Encrypt=True;Authentication="Active Directory Default";Database=LinaDb
      - name: connectionstrings--blobs
        value: '{{ .Env.LINA_STORAGE_BLOBENDPOINT }}'
      - name: googleanalytics--measurementid
        value: '{{ securedParameter "googleanalytics_measurementid" }}'
      - name: googlemaps--apikey
        value: '{{ securedParameter "googlemaps_apikey" }}'
      - name: mailgun--apikey
        value: '{{ securedParameter "mailgun_apikey" }}'
  template:
    containers:
      - image: {{ .Image }}
        name: lina-web
        env:
          - name: AZURE_CLIENT_ID
            value: {{ .Env.MANAGED_IDENTITY_CLIENT_ID }}
          - name: APPSETTINGS_HASH
            value: 154CD975A695D9E9C6AFA9D9113634AAFEB2FAE6965717B727013E8A4A8052C1
          - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
            value: "true"
          - name: AspireAppsettings
            value: 
          - name: GoogleAnalytics__Enabled
            value: '{{ parameter "googleanalytics_enabled" }}'
          - name: HTTP_PORTS
            value: '{{ targetPortOrDefault 0 }}'
          - name: Mailgun__Domain
            value: '{{ parameter "mailgun_domain" }}'
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES
            value: "true"
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES
            value: "true"
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY
            value: in_memory
          - name: ConnectionStrings__DefaultConnection
            secretRef: connectionstrings--defaultconnection
          - name: ConnectionStrings__blobs
            secretRef: connectionstrings--blobs
          - name: GoogleAnalytics__MeasurementId
            secretRef: googleanalytics--measurementid
          - name: GoogleMaps__ApiKey
            secretRef: googlemaps--apikey
          - name: Mailgun__ApiKey
            secretRef: mailgun--apikey
    scale:
      minReplicas: 1
tags:
  azd-service-name: lina-web
  aspire-resource-name: lina-web
